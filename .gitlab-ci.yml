stages:
  - build
  - test
  - deploy

variables:
  VENV_PATH: ".venv"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR"

cache:
  paths:
    - .cache/pip/

build:
  stage: build
  image: python:3.13
  script:
    - python --version
    - python -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - python -m compileall app
  artifacts:
    name: "api-productos-build-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 hour
    paths:
      - app/
      - tests/
      - requirements.txt
      - .venv/

test_coverage:
  stage: test
  image: python:3.13
  needs:
    - job: build
      artifacts: true
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: api_productos
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/api_productos"
  script:
    - source $VENV_PATH/bin/activate
    - pytest --cov=app --cov-report=term --cov-report=xml tests/
  coverage: '/TOTAL.*\s+(\d+)%/'
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

deploy:
  stage: deploy
  image: alpine:latest
  needs:
    - job: test_coverage
      artifacts: true
  before_script:
    - apk add --no-cache git
  script:
    - git config --global user.email "gitlab-ci@pipeline.com"
    - git config --global user.name "GitLab CI"
    - git remote add github https://$GITHUB_USERNAME:$GITHUB_TOKEN@github.com/$GITHUB_USERNAME/$GITHUB_REPO.git
    - git push github HEAD:main --force
  only:
    - main